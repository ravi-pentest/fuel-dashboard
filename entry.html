<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>දත්ත ඇතුළත් කිරීම | Fuel Reporting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; }
        .form-container { max-width: 600px; margin: 30px auto; background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-label { color: #8b949e; font-weight: 500; }
        .form-control, .form-select { background-color: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; }
        .form-control:focus, .form-select:focus { background-color: #0d1117; color: white; border-color: #58a6ff; box-shadow: none; }
        .btn-submit { width: 100%; padding: 15px; font-weight: bold; font-size: 1.1rem; background-color: #238636; border: none; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background-color: #2ea043; transform: scale(1.02); }
        .loading-overlay { display: none; text-align: center; margin-top: 10px; }
        .alert { border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center text-white mb-4">ඉන්ධන තොරතුරු ඇතුළත් කිරීම</h2>
        <hr style="border-color: #30363d;">
        
        <form id="fuelForm">
            <div class="mb-3">
                <label class="form-label">පළාත (Province)</label>
                <select id="province" class="form-select" required onchange="updatePoliceStations()">
                    <option value="">පළාත තෝරන්න...</option>
                    <option value="බස්නාහිර">බස්නාහිර</option>
                    <option value="මධ්‍යම">මධ්‍යම</option>
                    <option value="දකුණ">දකුණ</option>
                    <option value="වයඹ">වයඹ</option>
                    <option value="සබරගමුව">සබරගමුව</option>
                    <option value="නැගෙනහිර">නැගෙනහිර</option>
                    <option value="ඌව">ඌව</option>
                    <option value="උතුරු මැද">උතුරු මැද</option>
                    <option value="උතුර">උතුර</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">පොලිස් වසම (Police Division)</label>
                <select id="police" class="form-select" required onchange="updateSheds()">
                    <option value="">පළාත තෝරා සිටින්න...</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">පිරවුම්හල (Fuel Station)</label>
                <select id="station" class="form-select" required>
                    <option value="">වසම තෝරා සිටින්න...</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">පෙට්‍රල් තත්ත්වය</label>
                    <select id="petrol" class="form-select">
                        <option value="ඇත">ඇත</option>
                        <option value="නැත">නැත</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">ඩීසල් තත්ත්වය</label>
                    <select id="diesel" class="form-select">
                        <option value="ඇත">ඇත</option>
                        <option value="නැත">නැත</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">පෝලිමේ ඇති වාහන ගණන (දළ වශයෙන්)</label>
                <input type="number" id="queue" class="form-control" value="0" min="0">
            </div>

            <button type="submit" id="submitBtn" class="btn btn-success btn-submit">දත්ත ඉදිරිපත් කරන්න</button>
        </form>

        <div id="loader" class="loading-overlay">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">දත්ත යවමින් පවතී, කරුණාකර රැඳී සිටින්න...</p>
        </div>
        <div id="message" class="mt-3 text-center"></div>
    </div>
</div>

<script>
    // ඔබේ අලුත්ම Web App URL එක මෙතැනට ඇතුළත් කරන්න
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzA2ma7X8WO2-aUI6wGxW1FP1KYz3E_q1EK3IjMg7qLJOVxt91vBPBBcckHY_zzBIaQ4w/exec';
    let masterData = [];

    // මුලින්ම දත්ත පූරණය කිරීම
    async function loadMasterData() {
        const messageDiv = document.getElementById('message');
        messageDiv.innerHTML = '<span class="text-info">මූලික දත්ත පූරණය වෙමින් පවතී...</span>';
        try {
            const response = await fetch(`${scriptURL}?type=dropdown`);
            masterData = await response.json();
            messageDiv.innerHTML = '';
            console.log("Master data loaded successfully.");
        } catch (error) {
            console.error("Data loading error:", error);
            messageDiv.innerHTML = '<div class="alert alert-danger">දත්ත පූරණය කිරීමේ දෝෂයක්. කරුණාකර Refresh කරන්න.</div>';
        }
    }

    function updatePoliceStations() {
        const province = document.getElementById('province').value.trim();
        const policeSelect = document.getElementById('police');
        const stationSelect = document.getElementById('station');
        
        policeSelect.innerHTML = '<option value="">තෝරන්න...</option>';
        stationSelect.innerHTML = '<option value="">වසම තෝරා සිටින්න...</option>';

        if (!province) return;

        // පළාත අනුව Filter කිරීම (Trim භාවිතා කර අමතර හිස්තැන් ඉවත් කරයි)
        const filteredPolice = [...new Set(
            masterData
            .filter(d => d.province && d.province.toString().trim() === province)
            .map(d => d.police.toString().trim())
        )];

        if (filteredPolice.length === 0) {
            policeSelect.innerHTML = '<option value="">දත්ත හමු නොවීය</option>';
        } else {
            filteredPolice.sort().forEach(p => {
                policeSelect.innerHTML += `<option value="${p}">${p}</option>`;
            });
        }
    }

    function updateSheds() {
        const police = document.getElementById('police').value.trim();
        const stationSelect = document.getElementById('station');
        
        stationSelect.innerHTML = '<option value="">තෝරන්න...</option>';

        if (!police) return;

        const filteredSheds = masterData
            .filter(d => d.police && d.police.toString().trim() === police)
            .map(d => d.shedName.toString().trim());

        if (filteredSheds.length === 0) {
            stationSelect.innerHTML = '<option value="">දත්ත හමු නොවීය</option>';
        } else {
            filteredSheds.sort().forEach(s => {
                stationSelect.innerHTML += `<option value="${s}">${s}</option>`;
            });
        }
    }

    document.getElementById('fuelForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const message = document.getElementById('message');

        submitBtn.disabled = true;
        loader.style.display = 'block';
        message.innerHTML = '';

        const formData = new URLSearchParams();
        formData.append('province', document.getElementById('province').value);
        formData.append('police', document.getElementById('police').value);
        formData.append('station', document.getElementById('station').value);
        formData.append('petrol', document.getElementById('petrol').value);
        formData.append('diesel', document.getElementById('diesel').value);
        formData.append('queue', document.getElementById('queue').value);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => {
                loader.style.display = 'none';
                message.innerHTML = '<div class="alert alert-success">දත්ත සාර්ථකව ගබඩා කළා!</div>';
                document.getElementById('fuelForm').reset();
                submitBtn.disabled = false;
                // Dropdowns reset කිරීම
                document.getElementById('police').innerHTML = '<option value="">පළාත තෝරා සිටින්න...</option>';
                document.getElementById('station').innerHTML = '<option value="">වසම තෝරා සිටින්න...</option>';
            })
            .catch(err => {
                loader.style.display = 'none';
                message.innerHTML = '<div class="alert alert-danger">දෝෂයක් සිදු විය. නැවත උත්සාහ කරන්න.</div>';
                submitBtn.disabled = false;
            });
    });

    loadMasterData();
</script>

</body>
</html>
